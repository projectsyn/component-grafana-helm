apiVersion: v1
data:
  provider.yaml: |-
    apiVersion: 1
    providers:
      - name: 'sidecarProvider'
        orgId: 1
        folder: ''
        folderUid: ''
        type: file
        disableDeletion: false
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          foldersFromFilesStructure: false
          path: /tmp/dashboards
kind: ConfigMap
metadata:
  annotations:
    syn.tools/source: https://github.com/projectsyn/component-grafana-helm.git
  labels:
    app.kubernetes.io/component: grafana-helm
    app.kubernetes.io/instance: grafana-helm
    app.kubernetes.io/managed-by: commodore
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: syn
    app.kubernetes.io/version: 13.0.1
    helm.sh/chart: grafana-12.1.1
  name: grafana-helm-config-dashboards
  namespace: syn-grafana
