apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: grafana-helm
    app.kubernetes.io/instance: grafana-helm
    app.kubernetes.io/managed-by: commodore
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: syn
    app.kubernetes.io/version: 13.0.1
    helm.sh/chart: grafana-12.1.1
    release: grafana-helm
  name: grafana-helm
  namespace: syn-grafana
spec:
  endpoints:
    - honorLabels: true
      interval: 30s
      path: /metrics
      port: service
      scheme: http
      scrapeTimeout: 30s
  jobLabel: grafana-helm
  namespaceSelector:
    matchNames:
      - syn-grafana
  selector:
    matchLabels:
      app.kubernetes.io/instance: grafana-helm
      app.kubernetes.io/name: grafana
