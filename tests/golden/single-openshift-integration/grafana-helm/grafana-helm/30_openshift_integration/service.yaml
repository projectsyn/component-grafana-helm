apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: grafana-tls
    syn.tools/source: https://github.com/projectsyn/component-grafana-helm.git
  labels:
    app.kubernetes.io/component: grafana-helm
    app.kubernetes.io/instance: grafana-helm
    app.kubernetes.io/managed-by: commodore
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: syn
  name: grafana-helm
  namespace: syn-grafana
spec:
  ports:
    - name: service
      port: 3000
      protocol: TCP
      targetPort: grafana
  selector:
    app.kubernetes.io/instance: vshn-grafana
    app.kubernetes.io/name: grafana
  type: ClusterIP
