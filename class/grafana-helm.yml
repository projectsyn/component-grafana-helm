parameters:
  kapitan:
    dependencies:
      - type: helm
        source: https://grafana-community.github.io/helm-charts
        chart_name: grafana
        version: ${grafana_helm:charts:grafana}
        output_path: ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana}
    compile:
      - input_paths:
          - ${_base_directory}/component/app.jsonnet
        input_type: jsonnet
        output_path: .
      - input_paths:
          - grafana-helm/component/main.jsonnet
        input_type: jsonnet
        output_path: ${_instance}/
      - input_paths:
          - ${_base_directory}/component/helm.jsonnet
        input_type: jsonnet
        output_path: ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana}/
      - input_type: helm
        input_paths:
          - dependencies/${_instance}/helmcharts/grafana/${grafana_helm:charts:grafana}/
        helm_values_files:
          - ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana}/${_instance}-common.yaml
          - ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana}/${_instance}-openshift.yaml
          - ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana}/${_instance}-overrides.yaml
        helm_params:
          name: ${_instance}
          namespace: ${grafana_helm:namespace}
        output_path: ${_instance}/10_helmchart
