parameters:
  kapitan:
    dependencies:
      - type: helm
        source: ${grafana_helm:charts:grafana:source}
        chart_name: grafana
        version: ${grafana_helm:charts:grafana:version}
        output_path: ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana:version}/
    compile:
      - input_paths:
          - ${_base_directory}/component/app.jsonnet
        input_type: jsonnet
        output_path: .
      - input_paths:
          - grafana-helm/component/main.jsonnet
        input_type: jsonnet
        output_path: ${_instance}/
      - input_paths:
          - ${_base_directory}/component/helm.jsonnet
        input_type: jsonnet
        output_path: ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana:version}/
      - input_type: helm
        input_paths:
          - ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana:version}/
        helm_values_files:
          - ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana:version}/${_instance}-common.yaml
          - ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana:version}/${_instance}-openshift.yaml
          - ${_base_directory}/helmcharts/grafana/${grafana_helm:charts:grafana:version}/${_instance}-overrides.yaml
        helm_params:
          name: ${_instance}
          namespace: ${grafana_helm:namespace}
        output_path: ${_instance}/10_helmchart
