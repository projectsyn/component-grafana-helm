parameters:
  grafana_helm:
    =_metadata:
      multi_instance: true
      multi_tenant: true

    namespace: syn-grafana
    createNamespace: true
    namespaceLabels: {}
    namespaceAnnotations: {}

    secrets: {}

    charts:
      grafana:
        source: https://grafana-community.github.io/helm-charts
        version: 11.3.3

    images:
      grafana:
        registry: docker.io
        repository: grafana/grafana
        tag: 12.4.1
      sidecar:
        registry: quay.io
        repository: kiwigrid/k8s-sidecar
        tag: 2.5.0

    dashboards: {}
    datasources: {}
    extraConfigMap: {}

    openshiftIntegration:
      enabled: false
      auth:
        adminUser: 'admin'
        adminPassword: '?{vaultkv:${cluster:tenant}/${cluster:name}/${_instance}/admin_password}'
        scopes: 'user:info user:check-access user:list-projects'
        roleAttributePath: "contains(groups[*], 'openshiftroot') && 'GrafanaAdmin' || 'Editor'"
      ingress:
        urlPrefix: ${_instance}
      # OpenShift Datasources
      metrics:
        enabled: true
        name: Prometheus
      logsApps:
        enabled: true
        name: OpenShift Logging (Application)
      logsInfra:
        enabled: true
        name: OpenShift Logging (Infrastructure)
      logsAudit:
        enabled: false
        name: OpenShift Logging (Audit)

    helm_values:
      serviceMonitor:
        enabled: true
      testFramework:
        enabled: false
      initChownData:
        enabled: false
      deploymentStrategy:
        type: Recreate
